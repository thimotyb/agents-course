wing: agents_course
rooms:
- name: course_authoring_skill
  description: Technical and functional specifications for the course authoring workflow
  ui_features:
    controls:
      - "lang_switch: '#lang-select' for EN/IT (Google Translate integration)."
      - "theme_selector: '#theme-select' supporting Light and Dark modes."
      - "utility_buttons: Top print button in header; fixed 'Print' and 'Top' buttons at bottom-right viewport."
    navigation:
      - "outline_sidebar: Left panel (#outline-nav) with auto-generated navigable index."
      - "outline_behavior: Active section highlighting on scroll; collapsible tree with visible chevron arrows."
      - "click_navigation: Every index item must be clickable for direct section jump."
    shared_headers:
      - "hero_section: Contains Home link, H1 module title, and descriptive subtitle."
      - "dynamic_injection: Header controls and fixed buttons are injected by 'site.js' (do not hardcode)."
  module_structure:
    base_layout:
      - "sequence: Hero -> Info-grid (Learning outcomes/Topics) -> Main Content sections -> Guided Lab -> Key Takeaways."
      - "info_grid: Must follow the hero and contain outcomes and topics summary."
    hierarchy_and_numbering:
      - "headings: h2 for main sections (1, 2, 3); h3 for subsections (1.1, 1.2). No h4 or deeper."
      - "subsection_blocks: Each h3 is rendered as a distinct slide-like rectangular panel."
      - "numbering_logic: Explicit numeric prefixes (1, 1.1...); independent from source book numbering."
  authoring_rules:
    writing_style:
      - "prose_level: Prefer summarized, expository prose over long-form or bullet-only content."
      - "sentence_structure: Complete, medium-length sentences; clear and compact phrasing."
      - "language: Source content must be authored in English only."
      - "references: No direct references to previous/future modules or external book chapters."
    figure_interactions:
      - "figure_standard: Mandatory numbering (e.g., Figure M2.3) and descriptive captions."
      - "zoom_behavior: All figures are clickable to open a full-screen zoomed view (modal/lightbox)."
      - "close_action: A second click or close button restores the figure to its original in-flow size."

- name: non_regression_standards
  description: Unified validation criteria for course stability and quality
  criteria:
    - "content_locking: finalize and lock approved headings, core texts, images, and links using JSON lockfiles."
    - "ui_integrity: mandatory presence of outline-nav, language/theme selectors, and fixed utility buttons."
    - "hierarchy_rules: strict two-level structure (h2 for sections, h3 for subsections), no h4+."
    - "sequential_numbering: sections and subsections must follow a strict incremental numeric sequence (1.1, 1.2, 2.1...)."
    - "flow_standard: hero -> info-grid (Topics/Outcomes) -> body content -> guided lab -> key takeaways."
    - "broken_link_prevention: internal image paths must exist; external GitHub links must be periodically verified (HTTP 200)."
    - "figure_standards: numbered figures (Figure Mx.y), zoomable interaction, and descriptive captions."
    - "shared_logic_guard: protect shared JS behavior (outline spacers, event listeners) and CSS layouts from regressions."

- name: general
  description: All project files
memory:
  ui_requirements:
    - Left outline navigation must expose visible chevron arrows for per-section collapse/expand.
    - Outline tree remains click-to-navigate for every item and keeps active section highlighting.
    - Headings without sub-sections must use an '.outline-toggle-spacer' for vertical alignment.
    - Common UI (Header-top, Language/Theme selectors, Fixed Print/Top buttons) is dynamically injected by site.js. Do not hardcode in HTML.
    - Fixed 'Print' and 'Top' buttons must remain accessible at the bottom-right of the viewport.
  
  content_rules:
    - Course section numbering is independent from source/book numbering.
    - Never mirror book numbering in chapter headings.
    - Standard hierarchy: h2 for main sections (1, 2, 3), h3 for sub-sections (1.1, 1.2).
    - When importing a paragraph from resources, include all figures present in that source paragraph.
    - Guided lab links must point directly to the GitHub repository (e.g., https://github.com/thimotyb/building-llm-applications/blob/main/).
    - The "Topics" section must always be placed at the beginning of the module, right after the navigation panel.
    - Always run non-regression tests (python3 scripts/non_regression_guard.py check) before starting any modification on a finalized module.
    - Non-regression locks must include 'required_links' to protect Guided Labs and bibliography.

  writing_style:
    - Prefer summarized content over long-form prose.
    - Do not make text overly terse or bullet-like when body prose is expected.
    - Use complete sentences with medium length.
    - Keep phrasing clear and compact, avoiding overly long periods.

  project_progress:
    - M1: Finished, verified, and locked (includes Prompt Engineering from Ch02).
    - M2: Completed Introduction, MapReduce, Refine, Strategy Flowchart, and Research Engine Overview (Source Ch03 and Section 4.1 of Ch04).
    - Next step: Finalize M2 and lock for non-regression.
